<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>お問い合わせ｜OKAメディカルネクスト</title>

<style>
body{
  margin:0;
  font-family:"Helvetica Neue",Arial,sans-serif;
  background:#f8fbfc;
  color:#333;
  line-height:1.7;
}

header {
  background: #fff;
  padding: 14px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  position: sticky;
  top: 0;
  z-index: 20;
}

.header-inner {
  max-width: 1180px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #1497a3;
  font-weight: 800;
  font-size: 1.25rem;
  white-space: nowrap;
  text-decoration: none;
}

.logo-area img {
  width: 58px;
  height: auto;
  max-width: 58px;
}

nav {
  display: flex;
  gap: 28px;
  font-size: 0.98rem;
  font-weight: 800;
}

nav a {
  color: #1497a3;
  text-decoration: none;
}

@media (max-width: 768px) {
  .header-inner {
    flex-direction: column;
    align-items: flex-start;
  }

  .logo-area {
    font-size: 1.05rem;
  }

  .logo-area img {
    width: 54px;
    max-width: 54px;
  }

  nav {
    width: 100%;
    justify-content: space-between;
    gap: 8px;
    font-size: 0.86rem;
  }
}
  .card{
    padding:28px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo-area">
      <img src="logo.png" alt="OKAメディカルネクスト ロゴ">
      <span>OKAメディカルネクスト</span>
    </a>

    <nav>
      <a href="jobs.html">求人を探す</a>
      <a href="medical.html">医療機関の方へ</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="card">

    <h1>お問い合わせ</h1>

    <p class="subtitle">
      OKAメディカルネクストへのお問い合わせはこちらからお願いいたします。
    </p>

    <form id="contactForm">

      <div class="form-group">
        <label for="category">お問い合わせ種別 <span class="required">*</span></label>
        <select id="category" name="お問い合わせ種別" required>
          <option>医療機関からのお問い合わせ</option>
          <option>看護師・求職者からのお問い合わせ</option>
          <option>求人掲載について相談したい</option>
          <option>その他</option>
        </select>
      </div>

      <div class="form-group">
        <label for="name">お名前・ご担当者名 <span class="required">*</span></label>
        <input id="name" name="お名前・ご担当者名" type="text" placeholder="山田 太郎" required>
      </div>

      <div class="form-group">
        <label for="organization">医療機関名</label>
        <input id="organization" name="医療機関名" type="text" placeholder="〇〇病院・〇〇クリニック">
      </div>

      <div class="form-group">
        <label for="email">メールアドレス <span class="required">*</span></label>
        <input id="email" name="メールアドレス" type="email" placeholder="sample@example.com" required>
      </div>

      <div class="form-group">
        <label for="message">お問い合わせ内容 <span class="required">*</span></label>
        <textarea id="message" name="お問い合わせ内容" placeholder="お問い合わせ内容をご記入ください" required></textarea>
      </div>

      <div class="center">
        <button type="submit" class="btn">
          送信する
        </button>
      </div>

      <p id="formStatus" class="form-status" aria-live="polite"></p>

    </form>

    <p class="note">
  ※送信ボタンを押すと、お問い合わせ内容が送信されます。<br>
  ※お問い合わせ内容を確認後、担当よりご連絡いたします。<br>
  ※上記内容以外のご質問も受け付けております。メールでのお問い合わせは
  <a href="mailto:info@okamedicalnext.jp">info@okamedicalnext.jp</a>
  までご連絡ください。
</p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
const EMAILJS_SERVICE_ID = "service_me7hkoq";
const EMAILJS_TEMPLATE_ID = "template_fogn9zi";
const EMAILJS_PUBLIC_KEY = "JZI_Fp9TgG9rYt2sZ";
const CONTACT_EMAIL = "info@okamedicalnext.jp";

emailjs.init({
  publicKey: EMAILJS_PUBLIC_KEY
});

document.getElementById("contactForm").addEventListener("submit", function(event){
  event.preventDefault();

  const form = event.currentTarget;
  const category = document.getElementById("category").value;
  const name = document.getElementById("name").value;
  const organization = document.getElementById("organization").value || "未入力";
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;
  const button = form.querySelector("button[type='submit']");
  const status = document.getElementById("formStatus");

  const subject = `${category}`;
  const templateParams = {
    to_email: CONTACT_EMAIL,
    reply_to: email,
    from_name: name,
    user_name: name,
    user_email: email,
    category: category,
    organization: organization,
    subject: subject,
    message: message,
    送信先メールアドレス: CONTACT_EMAIL,
    返信先メールアドレス: email,
    お名前: name,
    メールアドレス: email,
    お問い合わせ種別: category,
    医療機関名: organization,
    件名: subject,
    お問い合わせ内容: message
  };

  button.disabled = true;
  button.textContent = "送信中...";
  status.className = "form-status";
  status.textContent = "送信しています。";

  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
    .then(function(){
      form.reset();
      status.className = "form-status success";
      status.textContent = "お問い合わせを送信しました。ありがとうございます。";
    })
    .catch(function(){
      status.className = "form-status error";
      status.textContent = "送信できませんでした。時間をおいて再度お試しください。";
    })
    .finally(function(){
      button.disabled = false;
      button.textContent = "送信する";
    });
});
</script>

</body>
</html>
