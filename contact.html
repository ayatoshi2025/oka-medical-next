<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>お問い合わせ｜OKAメディカルネクスト</title>

<style>
body{
  margin:0;
  font-family:"Helvetica Neue",Arial,sans-serif;
  background:#f8fbfc;
  color:#333;
  line-height:1.7;
}

header{
  background:#fff;
  padding:5px 5%;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:80px;
  width:auto;
}

nav a{
  margin-left:20px;
  color:#333;
  text-decoration:none;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:50px auto;
  padding:0 20px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:40px;
  box-shadow:0 6px 24px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  color:#139aaa;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:40px;
}

.form-group{
  margin-bottom:25px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

input,
select,
textarea{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  font-size:16px;
  box-sizing:border-box;
}

textarea{
  min-height:150px;
  resize:vertical;
}

.btn{
  display:inline-block;
  padding:16px 36px;
  border:none;
  border-radius:999px;
  background:#22b8c8;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.center{
  text-align:center;
}

.note{
  margin-top:30px;
  font-size:14px;
  color:#666;
  text-align:center;
}

.required{
  color:#f44336;
}

@media (max-width:700px){
  header{
    display:block;
    text-align:center;
  }

  nav a{
    display:inline-block;
    margin:6px;
  }

  .card{
    padding:28px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html">
      <img src="logo.png" alt="OKAメディカルネクスト">
    </a>
  </div>

  <nav>
    <a href="index.html">トップページ</a>
    <a href="medical.html">医療機関の方へ</a>
    <a href="nurse-register.html">看護師無料登録</a>
  </nav>
</header>

<div class="container">
  <div class="card">

    <h1>お問い合わせ</h1>

    <p class="subtitle">
      OKAメディカルネクストへのお問い合わせはこちらからお願いいたします。
    </p>

    <form>

      <div class="form-group">
        <label>お問い合わせ種別 <span class="required">*</span></label>
        <select>
          <option>医療機関からのお問い合わせ</option>
          <option>看護師・求職者からのお問い合わせ</option>
          <option>求人掲載について相談したい</option>
          <option>その他</option>
        </select>
      </div>

      <div class="form-group">
        <label>お名前・ご担当者名 <span class="required">*</span></label>
        <input type="text" placeholder="山田 太郎">
      </div>

      <div class="form-group">
        <label>医療機関名</label>
        <input type="text" placeholder="〇〇病院・〇〇クリニック">
      </div>

      <div class="form-group">
        <label>メールアドレス <span class="required">*</span></label>
        <input type="email" placeholder="sample@example.com">
      </div>

      <div class="form-group">
        <label>お問い合わせ内容 <span class="required">*</span></label>
        <textarea placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>

      <div class="center">
        <button type="submit" class="btn">
          送信する
        </button>
      </div>

    </form>

    <p class="note">
      ※現在はサンプル画面です。今後Googleフォーム等と連携して受付を行う予定です。<br>
      ※お問い合わせ内容を確認後、担当よりご連絡いたします。
    </p>

  </div>
</div>

</body>
</html>
