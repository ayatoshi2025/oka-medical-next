<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お支払いのご案内｜OKAメディカルネクスト</title>

<style>
body{
  margin:0;
  font-family:"Helvetica Neue",Arial,sans-serif;
  background:#f8fbfc;
  color:#333;
  line-height:1.7;
}

.container{
  max-width:900px;
  margin:50px auto;
  padding:0 20px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:40px;
  box-shadow:0 6px 24px rgba(0,0,0,0.08);
}

h1,h2{
  color:#139aaa;
}

h1{
  text-align:center;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:40px;
}

.bank-box{
  background:#f8fbfc;
  border:2px solid #d9eef1;
  border-radius:20px;
  padding:30px;
  margin:30px 0;
}

.bank-info{
  font-size:18px;
  line-height:2;
}

.flow{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin:30px 0;
}

.flow div{
  background:#e8fbfd;
  border-radius:16px;
  padding:18px;
  text-align:center;
  font-weight:bold;
  color:#139aaa;
}

.notice{
  background:#fff8e6;
  border-left:5px solid #f5b400;
  padding:20px;
  border-radius:12px;
  color:#555;
}

.btn{
  display:inline-block;
  background:#22b8c8;
  color:#fff;
  text-decoration:none;
  padding:15px 35px;
  border-radius:999px;
  font-weight:bold;
}

.center{
  text-align:center;
  margin-top:30px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>お支払いのご案内</h1>

    <p class="subtitle">
      お申し込みありがとうございます。<br>
      ご入金確認後、掲載内容の確認を行い、求人掲載を開始いたします。
    </p>

    <h2>掲載開始までの流れ</h2>

    <div class="flow">
      <div>1. お申し込み</div>
      <div>2. お支払い</div>
      <div>3. 内容確認</div>
      <div>4. 掲載開始</div>
    </div>

    <div class="bank-box">
      <h2>銀行振込</h2>

      <div class="bank-info">
        銀行名：三井住友銀行<br>
        支店名：豊橋支店<br>
        口座種別：普通口座<br>
        口座番号：3661960<br>
        口座名義：オカダ トシアキ
      </div>
    </div>

    <div class="notice">
      <strong>ご確認ください</strong><br>
      ※振込手数料はご負担ください。<br>
      ※ご入金確認後、通常1〜3営業日以内に掲載準備を開始します。<br>
      ※現在、クレジット決済は準備中です。
    </div>

    <div class="center">
      <a href="index.html" class="btn">トップページへ戻る</a>
    </div>

  </div>
</div>

</body>
</html>
