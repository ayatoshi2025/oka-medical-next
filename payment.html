<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書｜OKAメディカルネクスト</title>

<style>
body{
  margin:0;
  font-family:"Helvetica Neue",Arial,sans-serif;
  background:#f8fbfc;
  color:#333;
  line-height:1.7;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:0 20px;
}

.invoice{
  background:#fff;
  padding:50px;
  border-radius:20px;
  box-shadow:0 6px 24px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  font-size:36px;
  margin-bottom:40px;
}

.header-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:40px;
}

.company{
  text-align:right;
}

.table{
  width:100%;
  border-collapse:collapse;
  margin:30px 0;
}

.table th,
.table td{
  border:1px solid #ddd;
  padding:14px;
}

.table th{
  background:#f8fbfc;
}

.total{
  text-align:right;
  font-size:28px;
  font-weight:bold;
  color:#139aaa;
  margin:30px 0;
}

.bank-box{
  background:#f8fbfc;
  border:1px solid #d9eef1;
  border-radius:14px;
  padding:24px;
  margin-top:30px;
}

.notice{
  font-size:14px;
  color:#666;
  margin-top:20px;
}

.btn{
  display:inline-block;
  background:#22b8c8;
  color:white;
  border:none;
  text-decoration:none;
  padding:14px 30px;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
}

.center{
  text-align:center;
  margin-top:30px;
}

@media print{
  body{
    background:white;
  }

  .invoice{
    box-shadow:none;
    border-radius:0;
  }

  .no-print{
    display:none;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="invoice">

    <h1>請求書</h1>

    <div class="header-row">
      <div>
        <p>ご請求先：医療機関様</p>
        <p>発行日：<span id="today"></span></p>
        <p>請求書番号：OKA-<span id="invoiceNo"></span></p>
      </div>

      <div class="company">
        <strong>OKAメディカルネクスト</strong><br>
        岡田 利章<br>
        メール：toshiokada1980@gmail.com
      </div>
    </div>

    <table class="table">
      <tr>
        <th>内容</th>
        <th>税抜金額</th>
        <th>消費税</th>
        <th>税込金額</th>
      </tr>
      <tr>
        <td id="planName">掲載プラン</td>
        <td id="basePrice"></td>
        <td id="tax"></td>
        <td id="totalPrice"></td>
      </tr>
    </table>

    <div class="total">
      ご請求金額：<span id="grandTotal"></span>
    </div>

    <div class="bank-box">
      <h2>お振込先</h2>
      銀行名：三井住友銀行<br>
      支店名：豊橋支店<br>
      口座種別：普通口座<br>
      口座番号：3661960<br>
      口座名義：オカダ トシアキ
    </div>

    <p class="notice">
      ※振込手数料は貴社にてご負担ください。<br>
      ※ご入金確認後、掲載内容の確認を行い、求人掲載を開始いたします。<br>
      ※現在、クレジット決済は準備中です。
    </p>

    <div class="center no-print">
      <button onclick="window.print()" class="btn">
        印刷・PDF保存
      </button>

      <a href="index.html" class="btn">
        トップページへ戻る
      </a>
    </div>

  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

let planName = "スタンダードプラン";
let base = 10000;
let tax = 1000;
let total = 11000;

if(plan === "premium"){
  planName = "プレミアムプラン";
  base = 30000;
  tax = 3000;
  total = 33000;
}

function yen(num){
  return num.toLocaleString("ja-JP") + "円";
}

document.getElementById("planName").textContent = planName;
document.getElementById("basePrice").textContent = yen(base);
document.getElementById("tax").textContent = yen(tax);
document.getElementById("totalPrice").textContent = yen(total);
document.getElementById("grandTotal").textContent = yen(total);

const today = new Date();
document.getElementById("invoiceNo").textContent =
  today.getFullYear().toString() +
  String(today.getMonth()+1).padStart(2,"0") +
  String(today.getDate()).padStart(2,"0") +
  "-001";

document.getElementById("invoiceNo").textContent =
  today.getFullYear().toString() +
  String(today.getMonth()+1).padStart(2,"0") +
  String(today.getDate()).padStart(2,"0");
</script>

</body>
</html>
