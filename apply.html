<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>求人応募フォーム｜OKAメディカルネクスト</title>

<style>

body{
    margin:0;
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:#f8fbfc;
    color:#333;
}

header{
    background:#fff;
    padding:15px 5%;
    border-bottom:1px solid #eee;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#139aaa;
}

.container{
    max-width:900px;
    margin:50px auto;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:24px;
    padding:40px;
    box-shadow:0 6px 24px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    color:#139aaa;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:40px;
}

.form-group{
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    min-height:140px;
    resize:vertical;
}

.btn{
    display:inline-block;
    padding:16px 36px;
    border:none;
    border-radius:999px;
    background:#22b8c8;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

.center{
    text-align:center;
}

.note{
    margin-top:30px;
    font-size:14px;
    color:#666;
    text-align:center;
}

.back-link{
    display:inline-block;
    margin-top:20px;
    color:#139aaa;
    text-decoration:none;
}

.required{
    color:#f44336;
}

</style>
</head>

<body>

<header>
    <div class="logo">
        OKAメディカルネクスト
    </div>
</header>

<div class="container">

<div class="card">

<h1>求人応募フォーム</h1>

<p class="subtitle">
青葉メディカルクリニックへの応募フォームです
</p>

<form>

<div class="form-group">
<label>お名前 <span class="required">*</span></label>
<input type="text" placeholder="山田 太郎">
</div>

<div class="form-group">
<label>ふりがな</label>
<input type="text" placeholder="やまだ たろう">
</div>

<div class="form-group">
<label>メールアドレス <span class="required">*</span></label>
<input type="email" placeholder="sample@example.com">
</div>

<div class="form-group">
<label>電話番号 <span class="required">*</span></label>
<input type="tel" placeholder="090-1234-5678">
</div>

<div class="form-group">
<label>希望職種</label>
<select>
<option>看護師</option>
<option>准看護師</option>
<option>医療事務</option>
<option>その他</option>
</select>
</div>

<div class="form-group">
<label>希望雇用形態</label>
<select>
<option>正社員</option>
<option>パート</option>
<option>どちらでも可</option>
</select>
</div>

<div class="form-group">
<label>保有資格</label>
<input type="text" placeholder="看護師・准看護師など">
</div>

<div class="form-group">
<label>自己PR・応募動機</label>
<textarea placeholder="応募理由や自己PRをご記入ください"></textarea>
</div>

<div class="form-group">
<label>見学希望</label>
<select>
<option>希望する</option>
<option>希望しない</option>
</select>
</div>

<div class="center">
<button type="submit" class="btn">
応募内容を送信する
</button>
</div>

</form>

<div class="center">
<a href="premium-sample.html" class="back-link">
← 求人ページへ戻る
</a>
</div>

<p class="note">
※現在はサンプル画面です。実際の送信機能は今後実装予定です。
</p>

</div>

</div>

</body>
</html>
