<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>お問い合わせ｜OKAメディカルネクスト</title>

<style>
body{
  margin:0;
  font-family:"Helvetica Neue",Arial,sans-serif;
  background:#f8fbfc;
  color:#333;
  line-height:1.7;
}

header{
  background:#fff;
  padding:5px 5%;
  border-bottom:1px solid #eee;
}

.logo img{
  height:80px;
}

.container{
  max-width:900px;
  margin:50px auto;
  padding:0 20px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:40px;
  box-shadow:0 6px 24px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  color:#139aaa;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:40px;
}

.form-group{
  margin-bottom:25px;
}

label{
  display:block;
  font-weight:bold;
  margin-bottom:8px;
}

input,
select,
textarea{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  box-sizing:border-box;
  font-size:16px;
}

textarea{
  height:160px;
}

.btn{
  display:inline-block;
  background:#22b8c8;
  color:#fff;
  border:none;
  border-radius:999px;
  padding:16px 40px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
}

.center{
  text-align:center;
}

.note{
  margin-top:25px;
  font-size:14px;
  color:#666;
  text-align:center;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html">
      <img src="logo.png" alt="OKAメディカルネクスト">
    </a>
  </div>
</header>

<div class="container">
  <div class="card">

    <h1>お問い合わせ</h1>

    <p class="subtitle">
      求人掲載やサービス内容について、お気軽にお問い合わせください。
    </p>

    <form id="contactForm">

      <div class="form-group">
        <label>お問い合わせ種別</label>
        <select id="type">
          <option>医療機関からのお問い合わせ</option>
          <option>看護師・求職者からのお問い合わせ</option>
          <option>求人掲載について相談したい</option>
          <option>その他</option>
        </select>
      </div>

      <div class="form-group">
        <label>お名前・ご担当者名</label>
        <input type="text" id="name" placeholder="山田 太郎">
      </div>

      <div class="form-group">
        <label>医療機関名</label>
        <input type="text" id="facility" placeholder="〇〇病院・〇〇クリニック">
      </div>

      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="email" placeholder="sample@example.com">
      </div>

      <div class="form-group">
        <label>お問い合わせ内容</label>
        <textarea id="message" placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>

      <div class="center">
        <button type="button" class="btn" onclick="sendMail()">
          メールで送信する
        </button>
      </div>

    </form>

    <p class="note">
      ※送信ボタンを押すと、メールアプリが起動します。<br>
      ※内容をご確認のうえ送信してください。
    </p>

  </div>
</div>

<script>
function sendMail(){
  const type = document.getElementById("type").value;
  const name = document.getElementById("name").value;
  const facility = document.getElementById("facility").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const subject = encodeURIComponent("OKAメディカルネクスト お問い合わせ");
  const body = encodeURIComponent(
    "お問い合わせ種別：" + type + "\n" +
    "お名前・ご担当者名：" + name + "\n" +
    "医療機関名：" + facility + "\n" +
    "メールアドレス：" + email + "\n\n" +
    "お問い合わせ内容：\n" + message
  );

  window.location.href =
    "mailto:toshiokada1980@gmail.com?subject=" + subject + "&body=" + body;
}
</script>

</body>
</html>
