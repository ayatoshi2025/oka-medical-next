<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>看護師登録フォーム｜OKAメディカルネクスト</title>

<style>
body{
  margin:0;
  font-family:"Helvetica Neue",Arial,sans-serif;
  background:#f8fbfc;
  color:#333;
  line-height:1.7;
}

header{
  background:#fff;
  padding:5px 5%;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo img{
  height:80px;
  width:auto;
}

nav a{
  margin-left:20px;
  color:#333;
  text-decoration:none;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:50px auto;
  padding:0 20px;
}

.card{
  background:white;
  border-radius:24px;
  padding:40px;
  box-shadow:0 6px 24px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  color:#139aaa;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:40px;
}

.form-group{
  margin-bottom:25px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
}

input,
select,
textarea{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
  font-size:16px;
  box-sizing:border-box;
}

textarea{
  min-height:140px;
  resize:vertical;
}

.btn{
  display:inline-block;
  padding:16px 36px;
  border:none;
  border-radius:999px;
  background:#22b8c8;
  color:white;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  cursor:pointer;
}

.btn:hover{
  opacity:0.9;
}

.center{
  text-align:center;
}

.note{
  margin-top:30px;
  font-size:14px;
  color:#666;
  text-align:center;
}

.back-link{
  display:inline-block;
  margin-top:20px;
  color:#139aaa;
  text-decoration:none;
  font-weight:bold;
}

.required{
  color:#f44336;
}

@media (max-width:700px){
  header{
    display:block;
    text-align:center;
  }

  nav a{
    display:inline-block;
    margin:6px;
  }

  .card{
    padding:28px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html">
      <img src="logo.png" alt="OKAメディカルネクスト">
    </a>
  </div>

  <nav>
    <a href="index.html">トップページ</a>
    <a href="medical.html">医療機関の方へ</a>
  </nav>
</header>

<div class="container">
  <div class="card">

    <h1>看護師登録フォーム</h1>

    <p class="subtitle">
      OKAメディカルネクストへの登録フォームです。<br>
      ご希望に合った求人情報のご案内に活用させていただきます。
    </p>

    <form>

      <div class="form-group">
        <label>お名前 <span class="required">*</span></label>
        <input type="text" placeholder="山田 花子">
      </div>

      <div class="form-group">
        <label>ふりがな</label>
        <input type="text" placeholder="やまだ はなこ">
      </div>

      <div class="form-group">
        <label>メールアドレス <span class="required">*</span></label>
        <input type="email" placeholder="sample@example.com">
      </div>

      <div class="form-group">
        <label>電話番号 <span class="required">*</span></label>
        <input type="tel" placeholder="090-1234-5678">
      </div>

      <div class="form-group">
        <label>保有資格</label>
        <select>
          <option>看護師</option>
          <option>准看護師</option>
          <option>保健師</option>
          <option>助産師</option>
          <option>その他</option>
        </select>
      </div>

      <div class="form-group">
        <label>希望雇用形態</label>
        <select>
          <option>正社員</option>
          <option>パート</option>
          <option>夜勤専従</option>
          <option>どちらでも可</option>
          <option>未定</option>
        </select>
      </div>

      <div class="form-group">
        <label>希望勤務地</label>
        <input type="text" placeholder="例：東京都、神奈川県、全国可">
      </div>

      <div class="form-group">
        <label>転職希望時期</label>
        <select>
          <option>すぐ</option>
          <option>3か月以内</option>
          <option>半年以内</option>
          <option>未定</option>
        </select>
      </div>

      <div class="form-group">
        <label>転職希望時期・ご希望条件</label>
        <textarea placeholder="希望勤務地、希望年収、勤務形態、気になる求人などをご記入ください"></textarea>
      </div>

      <div class="center">
        <button type="submit" class="btn">
          登録する
        </button>
      </div>

    </form>

    <div class="center">
      <a href="premium-sample.html" class="back-link">
        ← 求人ページへ戻る
      </a>
    </div>

    <p class="note">
      ※ご登録いただいた情報は、求人情報のご案内およびご連絡のために利用いたします。<br>
      ※現在はサンプル画面です。実際の送信機能は今後Googleフォーム等と連携予定です。
    </p>

  </div>
</div>

</body>
</html>
